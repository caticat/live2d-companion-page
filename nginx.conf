server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.md$ {
    types {
      text/markdown md;
    }
    default_type text/markdown;
    try_files $uri =404;
    add_header Content-Disposition "inline";
  }

  location ~* \.(?:js|css|json|png|moc3|txt)$ {
    try_files $uri =404;
    expires 1h;
    add_header Cache-Control "public";
  }
}
