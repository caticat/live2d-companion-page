server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  error_page 404 /404.html;

  location / {
    try_files $uri $uri/ =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location = /notes.html {
    add_header Cache-Control "no-cache";
  }

  location ~* \.md$ {
    types {
      text/markdown md;
    }
    default_type text/markdown;
    try_files $uri =404;
    add_header Content-Disposition "inline";
  }

  location ~* \.(?:js|css)$ {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location ~* \.(?:json|svg|png|moc3|txt)$ {
    try_files $uri =404;
    expires 1d;
    add_header Cache-Control "public";
  }
}
